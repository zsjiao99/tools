<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>今天吃什么</title>
  <meta property="og:title" content="今天吃什么 - 选择困难症救星">
  <meta property="og:description" content="再也不用纠结吃什么了！来抽签决定吧！">
  <meta property="og:image" content="https://img11.360buyimg.com/imagetools/jfs/t1/208827/33/25330/42284/647d2156F8d7c9d03/92c2c5c0b7a5a856.png">
  <meta property="og:type" content="website">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 只给按钮添加点击优化，不要全局应用 */
    button {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* 优化动画性能，使用transform和opacity属性 */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(2160deg); }
    }
    .spinning {
      animation: spin 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      will-change: transform;
    }
    .result-pop {
      animation: pop 0.5s ease-out;
      will-change: transform, opacity;
    }
    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 0.5s ease-out;
      will-change: transform, opacity;
    }
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }
    .bounce {
      animation: bounce 1s ease;
      will-change: transform;
    }
    @keyframes slideIn {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .slide-in {
      animation: slideIn 0.3s ease-out;
      will-change: transform, opacity;
    }
    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb {
      background: #ff9a5a;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #ff7a3a;
    }
    /* 卡片悬停效果 */
    .card-hover {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    /* 按钮悬停效果 */
    .btn-hover {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn-hover:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
    .btn-hover:active {
      transform: scale(0.98);
    }
    /* 转盘样式 */
    .wheel-container {
      position: relative;
      display: inline-block;
    }
    .wheel-bg {
      background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
    }
    /* 标签样式 */
    .tag {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .tag:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    /* 动画延迟 */
    .delay-100 {
      animation-delay: 100ms;
    }
    .delay-200 {
      animation-delay: 200ms;
    }
    .delay-300 {
      animation-delay: 300ms;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-orange-100 via-pink-100 to-orange-50 min-h-screen py-8 px-4">
  <div class="max-w-md mx-auto text-center px-4">
    
    <div class="fade-in">
      <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">🍚 干饭吧</h1>
      <p id="timeTip" class="text-gray-600 mb-8 md:mb-10 text-lg">选择困难症救星！</p>
    </div>

    <!-- 加载指示器 -->
    <div id="loading" class="hidden fixed inset-0 flex items-center justify-center bg-black/50 z-50">
      <div class="bg-white rounded-xl p-6 shadow-2xl flex flex-col items-center transform transition-all duration-300 scale-100">
        <div class="w-12 h-12 border-4 border-orange-400 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-gray-700">加载中...</p>
      </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="hidden fixed top-4 right-4 bg-white rounded-lg shadow-lg p-4 z-50 max-w-xs transform transition-all duration-300 slide-in">
      <p id="toastMessage" class="text-gray-700"></p>
    </div>

    <!-- 转盘 -->
    <div class="relative w-56 h-56 sm:w-64 sm:h-64 md:w-72 md:h-72 mx-auto mb-8 md:mb-10 wheel-container">
      <div id="wheel" class="w-full h-full rounded-full wheel-bg shadow-2xl flex items-center justify-center border-4 sm:border-6 md:border-8 border-orange-400 transition-all duration-300">
        <div id="foodName" class="text-lg sm:text-2xl md:text-3xl font-bold text-orange-600 px-4 text-center">点击开始</div>
      </div>
      <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-2">
        <div class="w-0 h-0 border-l-8 sm:border-l-10 border-r-8 sm:border-r-10 border-t-16 sm:border-t-20 border-l-transparent border-r-transparent border-t-red-500"></div>
      </div>
    </div>

    <!-- 外卖红包入口 -->
    <a href="http://dpurl.cn/fgO6ehBz" target="_blank" class="block bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white p-4 sm:p-5 rounded-xl shadow-lg transition-all duration-300 hover:scale-105 text-center mb-6 sm:mb-8 card-hover">
      <div class="text-lg sm:text-2xl mb-1">🎁 抽签前先领红包</div>
      <div class="text-sm sm:text-base opacity-90">反正都要点外卖，先领66元红包再抽！</div>
    </a>

    <!-- 按钮 - 恢复最简单的 onclick，确保一定能工作 -->
    <button 
      id="startBtn"
      onclick="if(window.startDraw){window.startDraw();}else{alert('请刷新页面重试')}"
      class="bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white font-bold px-8 sm:px-10 md:px-12 py-4 sm:py-5 rounded-full text-lg sm:text-xl shadow-lg btn-hover mb-8 md:mb-10 w-full sm:w-auto"
    >
      🎲 开始抽签
    </button>

    <!-- 结果 -->
    <div id="result" class="hidden bg-white rounded-2xl p-5 sm:p-6 shadow-xl mb-8 md:mb-10 card-hover">
      <p class="text-gray-600 text-sm mb-3">今天就决定是你了！</p>
      <div class="flex items-center justify-center gap-4 sm:gap-5 mb-4 sm:mb-5">
        <p id="resultText" class="text-2xl sm:text-3xl md:text-4xl font-bold text-orange-600 result-pop text-center"></p>
        <button id="favoriteBtn" class="text-gray-400 hover:text-yellow-500 transition-colors transform hover:scale-110 touch-none" style="touch-action: manipulation; -webkit-tap-highlight-color: transparent; cursor: pointer;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
        </button>
      </div>
      <p class="text-gray-500 text-sm mt-3 sm:mt-4">🎯 命中注定，不许改！</p>
    </div>

    <!-- 菜单列表 -->
    <div class="bg-white/70 backdrop-blur-sm rounded-xl p-4 sm:p-5 mb-6 sm:mb-8 card-hover">
      <p class="text-sm text-gray-600 mb-3 font-medium">🍱 菜单库</p>
      <div class="flex flex-wrap gap-2 justify-center text-sm sm:text-base">
        <span class="bg-white px-3 py-1.5 rounded-full tag hover:bg-orange-100 transition-colors cursor-pointer">麦当劳</span>
        <span class="bg-white px-3 py-1.5 rounded-full tag hover:bg-orange-100 transition-colors cursor-pointer">肯德基</span>
        <span class="bg-white px-3 py-1.5 rounded-full tag hover:bg-orange-100 transition-colors cursor-pointer">黄焖鸡</span>
        <span class="bg-white px-3 py-1.5 rounded-full tag hover:bg-orange-100 transition-colors cursor-pointer">麻辣烫</span>
        <span class="bg-white px-3 py-1.5 rounded-full tag hover:bg-orange-100 transition-colors cursor-pointer">奶茶</span>
        <span class="bg-white px-3 py-1.5 rounded-full text-red-500 font-bold tag hover:bg-red-100 transition-colors cursor-pointer">不吃了减肥！</span>
        <span class="bg-gray-200 px-3 py-1.5 rounded-full tag hover:bg-gray-300 transition-colors cursor-pointer">还有60+道菜...</span>
      </div>
    </div>

    <!-- 历史记录 -->
    <div class="bg-white/70 backdrop-blur-sm rounded-xl p-4 sm:p-5 mb-6 sm:mb-8 card-hover">
      <p class="text-sm text-gray-600 mb-3 font-medium">📋 历史记录</p>
      <div id="historyList" class="text-sm sm:text-base max-h-32 sm:max-h-40 overflow-y-auto">
        <p class="text-gray-500 text-sm text-center">暂无历史记录</p>
      </div>
    </div>

    <!-- 收藏夹 -->
    <div class="bg-white/70 backdrop-blur-sm rounded-xl p-4 sm:p-5 mb-6 sm:mb-8 card-hover">
      <p class="text-sm text-gray-600 mb-3 font-medium">❤️ 我的收藏</p>
      <div id="favoritesList" class="flex flex-wrap gap-2 justify-center text-sm sm:text-base">
        <p class="text-gray-500 text-sm text-center w-full">暂无收藏</p>
      </div>
    </div>

    <p class="text-center text-gray-500 text-sm mt-6 sm:mt-8">领到红包的小伙伴，记得回来抽签哦 😉</p>

  </div>

  <!-- 所有JS全部内联，单文件独立运行！ -->
  <script>
    // ===== 后端 Mock (内联版) =====
    window.MockBackend = {
      menuData: {
        breakfast: ['包子', '豆浆', '油条', '煎饼果子', '茶叶蛋', '豆腐脑', '粥', '馄饨', '面条', '生煎包'],
        lunch: ['麦当劳', '肯德基', '黄焖鸡米饭', '麻辣烫', '螺蛳粉', '兰州拉面', '沙县小吃', '酸菜鱼', '宫保鸡丁', '鱼香肉丝', '盖浇饭', '炒饭', '炒面', '牛肉饭', '猪脚饭', '烧腊'],
        dinner: ['火锅', '烧烤', '烤鱼', '小龙虾', '牛蛙', '椰子鸡', '日料', '韩料', '泰国菜', '湘菜', '川菜', '粤菜', '江浙菜', '东北菜']
      },
      healthCheck: async function() {
        return { success: true, message: 'ok' };
      },
      getMenu: async function(type) {
        return { success: true, data: this.menuData[type] || this.menuData.lunch };
      },
      getHistory: async function() {
        const history = JSON.parse(localStorage.getItem('foodHistory') || '[]');
        return { success: true, data: history.slice(-20) };
      },
      addHistory: async function(food) {
        const history = JSON.parse(localStorage.getItem('foodHistory') || '[]');
        history.unshift({ food, timestamp: Date.now() });
        localStorage.setItem('foodHistory', JSON.stringify(history.slice(0, 100)));
        return { success: true };
      },
      getFavorites: async function() {
        const favorites = JSON.parse(localStorage.getItem('foodFavorites') || '[]');
        return { success: true, data: favorites };
      },
      toggleFavorite: async function(food) {
        const favorites = JSON.parse(localStorage.getItem('foodFavorites') || '[]');
        const index = favorites.indexOf(food);
        let msg;
        if (index > -1) {
          favorites.splice(index, 1);
          msg = '已取消收藏';
        } else {
          favorites.push(food);
          msg = '已添加收藏';
        }
        localStorage.setItem('foodFavorites', JSON.stringify(favorites));
        return { success: true, message: msg };
      },
      removeFavorite: async function(food) {
        let favorites = JSON.parse(localStorage.getItem('foodFavorites') || '[]');
        favorites = favorites.filter(f => f !== food);
        localStorage.setItem('foodFavorites', JSON.stringify(favorites));
        return { success: true, message: '已移除收藏' };
      }
    };

    // ===== 游戏主逻辑 (内联版) =====
    (function() {
      console.log('⚡ 单文件版 - 吃什么 v1.2');
      
      let elements = {};
      let foods = ['麦当劳', '肯德基', '黄焖鸡米饭', '麻辣烫', '螺蛳粉', '兰州拉面'];
      let isDrawing = false;
      let history = [];
      let favorites = [];

      function emergencyStartDraw() {
        console.log('🎲 点击了按钮');
        if (!window._appInitialized) {
          console.log('⚠️  强制初始化');
          init();
          setTimeout(() => startDrawReal(), 500);
          return;
        }
        startDrawReal();
      }
      
      window.startDraw = emergencyStartDraw;

      function getElements() {
        elements = {
          timeTip: document.getElementById('timeTip'),
          wheel: document.getElementById('wheel'),
          foodName: document.getElementById('foodName'),
          startBtn: document.getElementById('startBtn'),
          result: document.getElementById('result'),
          resultText: document.getElementById('resultText'),
          favoriteBtn: document.getElementById('favoriteBtn'),
          historyList: document.getElementById('historyList'),
          favoritesList: document.getElementById('favoritesList'),
          loading: document.getElementById('loading'),
          toast: document.getElementById('toast'),
          toastMessage: document.getElementById('toastMessage')
        };
        return elements;
      }

      function getMenuTypeByTime(hour) {
        if (hour < 10) {
          if(elements.timeTip) elements.timeTip.innerText = '🌅 该吃早饭啦';
          return 'breakfast';
        } else if (hour < 16) {
          if(elements.timeTip) elements.timeTip.innerText = '☀️ 该吃午饭啦';
          return 'lunch';
        } else {
          if(elements.timeTip) elements.timeTip.innerText = '🌙 该吃晚饭啦';
          return 'dinner';
        }
      }

      function showLoading() {
        if (elements.loading) elements.loading.classList.remove('hidden');
      }

      function hideLoading() {
        if (elements.loading) elements.loading.classList.add('hidden');
      }

      function showToast(message, duration = 2000) {
        if (elements.toast && elements.toastMessage) {
          elements.toastMessage.innerText = message;
          elements.toast.classList.remove('hidden');
          setTimeout(() => elements.toast.classList.add('hidden'), duration);
        }
      }

      function getRandomFood() {
        return foods[Math.floor(Math.random() * foods.length)];
      }

      function updateHistoryDisplay() {
        if (!elements.historyList) return;
        elements.historyList.innerHTML = '';
        if (history.length === 0) {
          elements.historyList.innerHTML = '<p class="text-gray-500 text-sm text-center">暂无历史记录</p>';
        } else {
          history.slice(0, 10).forEach((item, index) => {
            const date = new Date(item.timestamp);
            const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            const div = document.createElement('div');
            div.className = 'flex justify-between items-center p-2.5 bg-white rounded-lg mb-2 shadow-sm';
            div.innerHTML = `<span>${item.food}</span><span class="text-gray-500 text-sm">${timeStr}</span>`;
            elements.historyList.appendChild(div);
          });
        }
      }

      function updateFavoritesDisplay() {
        if (!elements.favoritesList) return;
        elements.favoritesList.innerHTML = '';
        if (favorites.length === 0) {
          elements.favoritesList.innerHTML = '<p class="text-gray-500 text-sm text-center w-full">暂无收藏</p>';
        } else {
          favorites.forEach((food) => {
            const span = document.createElement('span');
            span.className = 'bg-white px-3 py-1.5 rounded-full shadow-sm cursor-pointer hover:bg-red-50';
            span.textContent = food;
            span.onclick = () => removeFavorite(food);
            elements.favoritesList.appendChild(span);
          });
        }
      }

      function updateFavoriteButton() {
        if (!elements.favoriteBtn || !elements.resultText) return;
        const favorited = favorites.includes(elements.resultText.innerText);
        elements.favoriteBtn.innerHTML = favorited 
          ? '<svg width="24" height="24" fill="currentColor" class="text-yellow-500"><path d="m20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>'
          : '<svg width="24" height="24" fill="none" stroke="currentColor" class="text-gray-400"><path d="m20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';
      }

      async function toggleFavorite(food) {
        const response = await window.MockBackend.toggleFavorite(food);
        if (response.success) {
          favorites = (await window.MockBackend.getFavorites()).data;
          updateFavoritesDisplay();
          updateFavoriteButton();
          showToast(response.message);
        }
      }

      async function removeFavorite(food) {
        await window.MockBackend.removeFavorite(food);
        favorites = (await window.MockBackend.getFavorites()).data;
        updateFavoritesDisplay();
        updateFavoriteButton();
        showToast('已取消收藏');
      }

      async function startDrawReal() {
        if (isDrawing) return;
        isDrawing = true;
        
        if (elements.result) elements.result.classList.add('hidden');
        if (elements.startBtn) {
          elements.startBtn.innerText = '抽签中...';
          elements.startBtn.classList.remove('from-orange-500', 'to-orange-600');
          elements.startBtn.classList.add('bg-gray-400');
        }
        if (elements.wheel) elements.wheel.classList.add('spinning');
        
        let speed = 100;
        let frameCount = 0;
        
        function drawFrame() {
          if (frameCount < 20) {
            requestAnimationFrame(() => {
              if (elements.foodName) elements.foodName.innerText = getRandomFood();
              frameCount++;
              speed = Math.max(30, speed - 3);
              setTimeout(drawFrame, speed);
            });
          }
        }
        drawFrame();
        
        setTimeout(async () => {
          if (elements.wheel) elements.wheel.classList.remove('spinning');
          
          const result = getRandomFood();
          if (elements.foodName) elements.foodName.innerText = result;
          
          await window.MockBackend.addHistory(result);
          history = (await window.MockBackend.getHistory()).data;
          updateHistoryDisplay();
          
          if (elements.resultText) elements.resultText.innerText = result;
          if (elements.result) elements.result.classList.remove('hidden');
          
          updateFavoriteButton();
          
          if (elements.startBtn) {
            elements.startBtn.innerText = '🎲 再来一次';
            elements.startBtn.classList.remove('bg-gray-400');
            elements.startBtn.classList.add('from-orange-500', 'to-orange-600');
          }
          
          isDrawing = false;
        }, 3000);
      }

      async function init() {
        console.log('🚀 开始初始化...');
        
        getElements();
        console.log('📦 DOM元素获取完成', elements.startBtn ? '✓ startBtn存在' : '✗ startBtn不存在');
        
        showLoading();

        try {
          const hour = new Date().getHours();
          const menuType = getMenuTypeByTime(hour);
          const menuResponse = await window.MockBackend.getMenu(menuType);
          foods = menuResponse.data;
          
          history = (await window.MockBackend.getHistory()).data;
          favorites = (await window.MockBackend.getFavorites()).data;
          
          updateHistoryDisplay();
          updateFavoritesDisplay();
          
          if (elements.favoriteBtn) {
            elements.favoriteBtn.onclick = function() {
              const currentFood = elements.resultText.innerText;
              if (currentFood && currentFood !== '点击开始') toggleFavorite(currentFood);
            };
          }
          
          window._appInitialized = true;
          window.startDraw = startDrawReal;
          console.log('✅ 初始化完成！');
        } catch (e) {
          console.error('初始化错误:', e);
        } finally {
          setTimeout(hideLoading, 300);
        }
      }

      // 防弹初始化三保险
      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(init, 100);
      } else {
        document.addEventListener('DOMContentLoaded', init);
      }
      setTimeout(init, 3000);

      window.removeFavorite = removeFavorite;
      window.forceInit = init;
    })();
  </script>
</body>
</html>
